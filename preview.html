<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  body { background: #1a3a2a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 2rem; font-family: 'Nunito', sans-serif; }
  label { color: #b7e4c7; font-size: 0.8rem; text-align: center; margin-bottom: 0.3rem; display: block; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: rgba(82,183,136,0.15);
    border: 1px solid #52b788;
    color: #52b788;
    font-family: 'Press Start 2P', monospace;
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 0.6rem 1.6rem;
    border-radius: 100px;
  }

  /* Pokédex SVG ikona */
  .pokedex-icon { width: 28px; height: 28px; flex-shrink: 0; }
</style>
</head>
<body>

<div>
  <label>Trenutno (za usporedbu)</label>
  <div class="badge" style="font-size:0.75rem;">🎴 POKÉMON TCG</div>
</div>

<div>
  <label>Opcija A — Pokédex ikona + veći tekst</label>
  <div class="badge">
    <svg class="pokedex-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Pokédex tijelo -->
      <rect x="10" y="5" width="80" height="90" rx="10" ry="10" fill="#CC0000" stroke="#1a1a1a" stroke-width="4"/>
      <!-- Gornji bijeli dio ekrana -->
      <rect x="18" y="18" width="64" height="38" rx="5" ry="5" fill="#111" stroke="#333" stroke-width="2"/>
      <!-- Ekran - zeleni display -->
      <rect x="22" y="22" width="56" height="30" rx="3" ry="3" fill="#52b788"/>
      <!-- Linija koja dijeli gore/dolje -->
      <line x1="10" y1="65" x2="90" y2="65" stroke="#1a1a1a" stroke-width="3"/>
      <!-- Donji dio - gumbi -->
      <circle cx="30" cy="78" r="7" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
      <circle cx="50" cy="78" r="7" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
      <circle cx="70" cy="78" r="7" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
      <!-- Mali LED gore lijevo -->
      <circle cx="25" cy="11" r="5" fill="#52b788" stroke="#1a1a1a" stroke-width="2"/>
    </svg>
    POKÉMON TCG
  </div>
</div>

<div>
  <label>Opcija B — Samo tekst, bez ikone, još veći</label>
  <div class="badge" style="font-size:1.3rem; letter-spacing: 4px;">POKÉMON TCG</div>
</div>

</body>
</html>
